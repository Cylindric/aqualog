services:

  authdb:
    image: docker.io/library/postgres:${POSTGRES_TAG}
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${AUTHENTIK_POSTGRESQL__NAME}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD}
      POSTGRES_USER: ${AUTHENTIK_POSTGRESQL__USER}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    restart: unless-stopped
    volumes:
      - authdb:/var/lib/postgresql/data

  authserver:
    command: server
    depends_on:
      authdb:
        condition: service_healthy
    env_file:
      - .env
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG}
    ports:
      - ${AUTH_PORT_HTTP}:9000
      - ${AUTH_PORT_HTTPS}:9443
    restart: unless-stopped
    shm_size: 512mb
    volumes:
      - ./.data/data:/data
      - ./.data/custom-templates:/templates

  authworker:
    command: worker
    depends_on:
      authdb:
        condition: service_healthy
    env_file:
      - .env
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG}
    restart: unless-stopped
    shm_size: 512mb
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.data/data:/data
      - ./.data/certs:/certs
      - ./.data/custom-templates:/templates

  backenddb:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: "${AQUALOG_DB_NAME}"
      POSTGRES_USER: "${AQUALOG_DB_USER}"
      POSTGRES_PASSWORD: "${AQUALOG_DB_PASSWORD}"
    ports:
      - "${AQUALOG_DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AQUALOG_DB_USER} -d ${AQUALOG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - backenddb-data:/var/lib/postgresql/data

  backend:
    image: aqualog-backend:${BACKEND_TAG}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT_HTTP}:8000"
    env_file:
      - .env
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt
    depends_on:
      backenddb:
        condition: service_healthy

  frontend:
    image: aqualog-frontend:${FRONTEND_TAG}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT_HTTP}:8000"
    volumes:
      - ./frontend/dist:/app/frontend
      - ./frontend/backend:/app/backend

  proxy:
    image: caddybuilds/caddy-cloudflare:${CADDY_TAG}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    env_file:
      - .env
    ports:
      - "${PROXY_PORT_HTTP}:80"
      - "${PROXY_PORT_HTTPS}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config


volumes:
  authdb:
    driver: local
  caddy_data:
  caddy_config:
  backenddb-data:
    driver: local
