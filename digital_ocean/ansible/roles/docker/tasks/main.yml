---
# Add Docker's official GPG key to verify package integrity
- name: Add Docker GPG apt Key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc

# Register the official Docker APT repository as a package source
- name: Add Docker Repository
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]  https://download.docker.com/linux/ubuntu resolute stable
    state: present

# Install the Docker CE package from the Docker repository
- name: Update apt and install docker-ce
  ansible.builtin.apt:
    name: docker-ce
    state: latest
    update_cache: true

# Install the Python Docker SDK so Ansible can communicate with Docker
- name: Install Docker Module for Python
  ansible.builtin.apt:
    name: python3-docker

# Install Docker Compose v2 as an APT plugin (replaces standalone binary)
- name: Install Docker Compose plugin
  apt:
    name: docker-compose-plugin
    state: latest
    update_cache: true

# Create the docker configuration file
- name: Create Docker configuration file
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    owner: root
    group: root
    mode: '0644'
