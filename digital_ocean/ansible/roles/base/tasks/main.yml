---
# Install aptitude so Ansible can manage packages more reliably
- name: Install aptitude
  ansible.builtin.apt:
    name: aptitude
    state: latest
    update_cache: true

# Install packages required before Docker can be added
- name: Install required system packages
  ansible.builtin.apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - python3-pip
      - virtualenv
      - python3-setuptools
    state: latest
    update_cache: true

- name: Update OS packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

# Reboot if required after package updates
- name: Check if reboot required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  changed_when: false

- name: Reboot if required
  ansible.builtin.reboot:
  when: reboot_required_file.stat.exists == true
